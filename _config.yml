# ============================================================
# Reading Files
# ============================================================
include:
  - .htaccess
  - _pages
  - files
links:
  - label: "Email"
    icon: "fas fa-fw fa-envelope-square"
    url: "mailto:13liys@tongji.edu.cn"
  - label: "Google Scholar"
    icon: "fas fa-fw fa-graduation-cap"
    url: "https://scholar.google.com/citations?user=LcK-Ic0AAAAJ"

# ============================================================
# Build Settings
# ============================================================
markdown:    kramdown
highlighter: rouge
lsi:         false
excerpt_separator: "\n\n"
incremental: false

# ============================================================
# Markdown Processing
# ============================================================
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# ============================================================
# Collections
# ============================================================
collections:
  pages:
    output: true
    permalink: /:path/

# ============================================================
# Defaults
# ============================================================
defaults:
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: default
      author_profile: true

# ============================================================
# Sass/SCSS
# ============================================================
sass:
  sass_dir: _sass
  style: compressed

# ============================================================
# Plugins
# ============================================================
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

# ============================================================
# Archives
# ============================================================
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# ============================================================
# HTML Compression
# ============================================================
compress_html:
  clippings: all
  ignore:
    envs: development
